<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Data Structure Node Visualizer</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#020408; width:100%; height:100vh; overflow:hidden; font-family:'Courier New',monospace; }
    #canvas-container { position:absolute; inset:0; }

    .hud {
      position:absolute; top:0; left:0; right:0;
      padding:20px 24px;
      display:flex; justify-content:space-between; align-items:flex-start;
      z-index:10; pointer-events:none;
    }
    .hud-left .title { font-size:11px; letter-spacing:4px; color:rgba(99,179,237,0.7); text-transform:uppercase; }
    .hud-left .sub   { font-size:9px; letter-spacing:2px; color:rgba(99,179,237,0.3); margin-top:4px; }
    .stats { display:flex; flex-direction:column; gap:3px; align-items:flex-end; }
    .stat  { font-size:9px; letter-spacing:2px; color:rgba(99,179,237,0.35); }
    .stat span { color:rgba(99,179,237,0.8); font-weight:bold; }

    .legend {
      position:absolute; bottom:20px; left:24px;
      z-index:10; pointer-events:none;
      display:flex; flex-direction:column; gap:6px;
    }
    .legend-row { display:flex; align-items:center; gap:8px; font-size:9px; letter-spacing:2px; color:rgba(255,255,255,0.25); }
    .legend-dot { width:8px; height:8px; border-radius:50%; }

    .hint {
      position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
      font-size:9px; letter-spacing:3px; color:rgba(255,255,255,0.15);
      text-transform:uppercase; z-index:10; pointer-events:none;
    }
    canvas { display:block; }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="hud">
  <div class="hud-left">
    <div class="title">Graph · DSA Visualizer</div>
    <div class="sub">Interactive Network · Three.js</div>
  </div>
  <div class="stats">
    <div class="stat">NODES <span>32</span></div>
    <div class="stat">EDGES <span>48</span></div>
    <div class="stat" id="hoverStat">HOVER <span>—</span></div>
  </div>
</div>

<div class="legend">
  <div class="legend-row"><div class="legend-dot" style="background:#3b82f6"></div>Standard Node</div>
  <div class="legend-row"><div class="legend-dot" style="background:#ffffff"></div>Active / Hover</div>
  <div class="legend-row"><div class="legend-dot" style="background:#f59e0b"></div>Hub Node (high degree)</div>
</div>

<div class="hint">hover a node to highlight connections</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const container = document.getElementById('canvas-container');
const W = container.clientWidth || window.innerWidth;
const H = container.clientHeight || window.innerHeight;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(W, H);
renderer.setClearColor(0x020408);
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, W / H, 0.1, 200);
camera.position.set(0, 4, 16);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.5;
controls.enableZoom = true;

// ── GRAPH DATA ─────────────────────────────────
const NODE_COUNT = 32;
const EDGE_COUNT = 48;

// Random positions on a sphere + interior
const nodePositions = [];
const nodeConnections = Array.from({ length: NODE_COUNT }, () => []);

for (let i = 0; i < NODE_COUNT; i++) {
  const phi   = Math.acos(2 * Math.random() - 1);
  const theta = Math.random() * Math.PI * 2;
  const r     = 2.5 + Math.random() * 4.5;
  nodePositions.push(new THREE.Vector3(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.cos(phi),
    r * Math.sin(phi) * Math.sin(theta)
  ));
}

// Build edges (random connections, no duplicates)
const edges = [];
const edgeSet = new Set();
let attempts = 0;
while (edges.length < EDGE_COUNT && attempts < 5000) {
  const a = Math.floor(Math.random() * NODE_COUNT);
  const b = Math.floor(Math.random() * NODE_COUNT);
  if (a !== b) {
    const key = a < b ? `${a}-${b}` : `${b}-${a}`;
    if (!edgeSet.has(key)) {
      edgeSet.add(key);
      edges.push([a, b]);
      nodeConnections[a].push(b);
      nodeConnections[b].push(a);
    }
  }
  attempts++;
}

// Node degrees → hub detection
const degrees = nodeConnections.map(c => c.length);
const maxDeg  = Math.max(...degrees);

// ── INSTANCED MESH FOR NODES ────────────────────
const sphereGeo = new THREE.SphereGeometry(0.18, 10, 8);
const nodeMat   = new THREE.MeshStandardMaterial({ roughness: 0.3, metalness: 0.6 });
const instancedNodes = new THREE.InstancedMesh(sphereGeo, nodeMat, NODE_COUNT);
instancedNodes.instanceMatrix.setUsage(THREE.DynamicDrawUsage);

const dummy = new THREE.Object3D();
const colorNormal  = new THREE.Color(0x3b82f6);
const colorHub     = new THREE.Color(0xf59e0b);
const colorHovered = new THREE.Color(0xffffff);
const colorDimmed  = new THREE.Color(0x1e3a5f);

for (let i = 0; i < NODE_COUNT; i++) {
  dummy.position.copy(nodePositions[i]);
  dummy.updateMatrix();
  instancedNodes.setMatrixAt(i, dummy.matrix);
  const isHub = degrees[i] >= maxDeg * 0.6;
  instancedNodes.setColorAt(i, isHub ? colorHub : colorNormal);
}
instancedNodes.instanceMatrix.needsUpdate = true;
instancedNodes.instanceColor.needsUpdate  = true;
scene.add(instancedNodes);

// Glow halos around hub nodes
const haloGeo = new THREE.SphereGeometry(0.32, 8, 6);
const haloMat = new THREE.MeshBasicMaterial({
  color: 0xf59e0b, transparent: true, opacity: 0.08,
  blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.FrontSide
});
for (let i = 0; i < NODE_COUNT; i++) {
  if (degrees[i] >= maxDeg * 0.6) {
    const halo = new THREE.Mesh(haloGeo, haloMat.clone());
    halo.position.copy(nodePositions[i]);
    scene.add(halo);
  }
}

// ── LINE SEGMENTS FOR EDGES ─────────────────────
const edgePositions = new Float32Array(EDGE_COUNT * 2 * 3);
for (let i = 0; i < edges.length; i++) {
  const [a, b] = edges[i];
  const pa = nodePositions[a], pb = nodePositions[b];
  edgePositions[i*6+0] = pa.x; edgePositions[i*6+1] = pa.y; edgePositions[i*6+2] = pa.z;
  edgePositions[i*6+3] = pb.x; edgePositions[i*6+4] = pb.y; edgePositions[i*6+5] = pb.z;
}

const edgeGeo = new THREE.BufferGeometry();
edgeGeo.setAttribute('position', new THREE.BufferAttribute(edgePositions, 3));
const lineColors = new Float32Array(EDGE_COUNT * 2 * 3);
for (let i = 0; i < EDGE_COUNT * 2; i++) {
  lineColors[i*3]   = 0.149; // r  (0x3b82f6 dimmed)
  lineColors[i*3+1] = 0.220; // g
  lineColors[i*3+2] = 0.420; // b
}
edgeGeo.setAttribute('color', new THREE.BufferAttribute(lineColors, 3));
const edgeMat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.35 });
const edgeLines = new THREE.LineSegments(edgeGeo, edgeMat);
scene.add(edgeLines);

// Particle background
const starCount = 300;
const starPos   = new Float32Array(starCount * 3);
for (let i = 0; i < starCount * 3; i++) starPos[i] = (Math.random() - 0.5) * 60;
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({
  color: 0x4488ff, size: 0.04, transparent: true, opacity: 0.35, sizeAttenuation: true
})));

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const pl = new THREE.PointLight(0x3b82f6, 3, 30);
pl.position.set(0, 8, 0);
scene.add(pl);

// ── RAYCASTING FOR HOVER ────────────────────────
const raycaster  = new THREE.Raycaster();
raycaster.params.Points.threshold = 0.3;
const mouse      = new THREE.Vector2(-9, -9);
let hoveredNode  = -1;
let needsRender  = true;
const hoverStat  = document.getElementById('hoverStat');

renderer.domElement.addEventListener('mousemove', (e) => {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
  mouse.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
  needsRender = true;
});

renderer.domElement.addEventListener('mouseleave', () => {
  mouse.set(-9, -9);
  needsRender = true;
});

function updateHover() {
  raycaster.setFromCamera(mouse, camera);
  const hit = raycaster.intersectObject(instancedNodes);
  const newHovered = hit.length > 0 ? hit[0].instanceId : -1;

  if (newHovered === hoveredNode) return;
  hoveredNode = newHovered;

  // Reset all colors
  for (let i = 0; i < NODE_COUNT; i++) {
    const isHub = degrees[i] >= maxDeg * 0.6;
    instancedNodes.setColorAt(i, hoveredNode === -1
      ? (isHub ? colorHub : colorNormal)
      : colorDimmed
    );
  }

  // Reset all edge colors
  for (let i = 0; i < EDGE_COUNT * 2 * 3; i += 3) {
    lineColors[i]   = hoveredNode === -1 ? 0.149 : 0.05;
    lineColors[i+1] = hoveredNode === -1 ? 0.220 : 0.07;
    lineColors[i+2] = hoveredNode === -1 ? 0.420 : 0.14;
  }

  if (hoveredNode !== -1) {
    // Highlight hovered node
    instancedNodes.setColorAt(hoveredNode, colorHovered);

    // Highlight connected nodes + their edges
    const connected = nodeConnections[hoveredNode];
    connected.forEach(n => {
      instancedNodes.setColorAt(n, new THREE.Color(0x60a5fa));
    });

    // Highlight connected edges
    edges.forEach(([a, b], i) => {
      if (a === hoveredNode || b === hoveredNode) {
        // bright white edge
        for (let v = 0; v < 2; v++) {
          lineColors[(i*2+v)*3]   = 1.0;
          lineColors[(i*2+v)*3+1] = 1.0;
          lineColors[(i*2+v)*3+2] = 1.0;
        }
      }
    });

    hoverStat.innerHTML = `HOVER <span>Node ${hoveredNode} · deg ${degrees[hoveredNode]}</span>`;
  } else {
    hoverStat.innerHTML = `HOVER <span>—</span>`;
  }

  instancedNodes.instanceColor.needsUpdate = true;
  edgeGeo.attributes.color.needsUpdate = true;
}

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  updateHover();

  if (controls.autoRotate || needsRender) {
    renderer.render(scene, camera);
    needsRender = false;
  }
}
animate();

window.addEventListener('resize', () => {
  const W2 = window.innerWidth, H2 = window.innerHeight;
  camera.aspect = W2 / H2;
  camera.updateProjectionMatrix();
  renderer.setSize(W2, H2);
  needsRender = true;
});
</script>
</body>
</html>
