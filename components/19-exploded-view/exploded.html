<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Interactive Procedural DNA</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            950: '#020617',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; background-color: #020617; color: white; overflow: hidden; font-family: 'Inter', sans-serif; }
        #root { width: 100vw; height: 100vh; position: relative; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Imports -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "three": "https://esm.sh/three@0.160.0",
            "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.14?external=react,react-dom,three"
        }
    }
    </script>

    <script>
        const origWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && (args[0].includes('in-browser Babel transformer') || args[0].includes('cdn.tailwindcss.com should not be used in production'))) return;
            origWarn.apply(console, args);
        };
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-type="module">
        import React, { useRef, useMemo, useEffect, useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import * as THREE from 'three';
        import { Canvas, useFrame, useThree } from '@react-three/fiber';

        const PARTICLE_COUNT = 300;
        const STRAND_RADIUS = 2.5;
        const HEIGHT_SPREAD = 0.08;
        const FREQUENCY = 0.5;

        // --- Core DNA Structure ---
        const DNAHelix = () => {
            const instancedMeshRef = useRef();
            const linesRef = useRef();
            const groupRef = useRef();
            const { invalidate } = useThree();

            // 1. Procedural Generation Arrays
            const { matrices, colors, linePositions, lineColors } = useMemo(() => {
                const tempObject = new THREE.Object3D();
                const tempColor = new THREE.Color();
                
                // For InstancedMesh (Both strands)
                const matrices = new Float32Array(PARTICLE_COUNT * 2 * 16);
                const colors = new Float32Array(PARTICLE_COUNT * 2 * 3);
                
                // For LineSegments (Rungs connecting strands)
                const linePositions = [];
                const lineColors = [];

                const color1 = new THREE.Color("#06b6d4"); // Cyan
                const color2 = new THREE.Color("#d946ef"); // Magenta

                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    const t = i * FREQUENCY;
                    const y = (i - PARTICLE_COUNT / 2) * HEIGHT_SPREAD;
                    
                    // Strand 1 (Cyan)
                    const x1 = Math.cos(t) * STRAND_RADIUS;
                    const z1 = Math.sin(t) * STRAND_RADIUS;
                    
                    tempObject.position.set(x1, y, z1);
                    tempObject.updateMatrix();
                    tempObject.matrix.toArray(matrices, i * 16);
                    tempColor.copy(color1).toArray(colors, i * 3);

                    // Strand 2 (Magenta) - Offset by Pi
                    const x2 = Math.cos(t + Math.PI) * STRAND_RADIUS;
                    const z2 = Math.sin(t + Math.PI) * STRAND_RADIUS;
                    
                    tempObject.position.set(x2, y, z2);
                    tempObject.updateMatrix();
                    tempObject.matrix.toArray(matrices, (i + PARTICLE_COUNT) * 16);
                    tempColor.copy(color2).toArray(colors, (i + PARTICLE_COUNT) * 3);

                    // Create Base Pairs (Rungs between strands every few nodes)
                    if (i % 3 === 0) {
                        linePositions.push(x1, y, z1); // Start of line
                        linePositions.push(x2, y, z2); // End of line
                        
                        // Gradient line colors
                        lineColors.push(color1.r, color1.g, color1.b);
                        lineColors.push(color2.r, color2.g, color2.b);
                    }
                }

                return { 
                    matrices, 
                    colors, 
                    linePositions: new Float32Array(linePositions), 
                    lineColors: new Float32Array(lineColors) 
                };
            }, []);

            // 2. Hydrate InstancedMesh on mount
            useEffect(() => {
                if (instancedMeshRef.current) {
                    for (let i = 0; i < PARTICLE_COUNT * 2; i++) {
                        const matrix = new THREE.Matrix4().fromArray(matrices, i * 16);
                        instancedMeshRef.current.setMatrixAt(i, matrix);
                    }
                    instancedMeshRef.current.instanceMatrix.needsUpdate = true;
                }
            }, [matrices]);

            // 3. Continuous gentle rotation
            useFrame((state, delta) => {
                if (groupRef.current) {
                    groupRef.current.rotation.y += delta * 0.15;
                    groupRef.current.position.y = Math.sin(state.clock.elapsedTime * 0.5) * 0.5;
                    invalidate(); // Keep frameloop running for continuous animation
                }
            });

            return (
                <group ref={groupRef}>
                    {/* INSTANCED MESH: Draws all 600 DNA atoms in a SINGLE GPU Draw Call */}
                    <instancedMesh ref={instancedMeshRef} args={[null, null, PARTICLE_COUNT * 2]}>
                        <sphereGeometry args={[0.08, 8, 8]}>
                            <instancedBufferAttribute attach="attributes-color" args={[colors, 3]} />
                        </sphereGeometry>
                        <meshBasicMaterial vertexColors toneMapped={false} />
                    </instancedMesh>

                    {/* LINE SEGMENTS: Draws all base pair rungs natively */}
                    <lineSegments ref={linesRef}>
                        <bufferGeometry>
                            <bufferAttribute attach="attributes-position" count={linePositions.length / 3} array={linePositions} itemSize={3} />
                            <bufferAttribute attach="attributes-color" count={lineColors.length / 3} array={lineColors} itemSize={3} />
                        </bufferGeometry>
                        <lineBasicMaterial vertexColors toneMapped={false} transparent opacity={0.3} />
                    </lineSegments>
                </group>
            );
        };

        // --- Camera & Interaction ---
        const Scene = () => {
            const { camera, pointer, invalidate } = useThree();
            const groupRef = useRef();

            // Hardware-accelerated Parallax bound to mouse
            useFrame(() => {
                // Lerp camera towards mouse coordinates for smooth lag effect
                const targetX = (pointer.x * 2);
                const targetY = (pointer.y * 2);
                
                camera.position.x += (targetX - camera.position.x) * 0.05;
                camera.position.y += (targetY - camera.position.y) * 0.05;
                camera.lookAt(0, 0, 0);
            });

            return (
                <group ref={groupRef}>
                    <DNAHelix />
                </group>
            );
        };

        const App = () => {
            return (
                <div className="w-full h-screen bg-slate-950 flex flex-col items-center justify-center relative touch-none">
                    
                    {/* Top UI HUD Overlay */}
                    <div className="absolute top-8 left-8 pointer-events-none z-10">
                        <h1 className="text-white tracking-[0.2em] text-sm uppercase font-black mb-1">
                            Gen-Seq <span className="text-cyan-400">v9.2</span>
                        </h1>
                        <p className="text-slate-500 font-mono text-[10px] tracking-widest">PROCEDURAL BIO-COMPUTATION</p>
                    </div>

                    <div className="absolute bottom-8 right-8 pointer-events-none text-right">
                        <div className="flex items-center justify-end gap-3 mb-2">
                            <span className="relative flex h-2 w-2">
                              <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-magenta-400 opacity-75"></span>
                              <span className="relative inline-flex rounded-full h-2 w-2 bg-fuchsia-500"></span>
                            </span>
                            <span className="text-slate-400 font-mono text-[10px] tracking-widest uppercase">System Online</span>
                        </div>
                        <p className="text-slate-600 font-mono text-[9px] tracking-widest">INSTANCED_MESH // ZERO_MODELS</p>
                    </div>

                    {/* Highly Optimized R3F Scene */}
                    <div className="w-full h-full cursor-crosshair">
                        <Canvas 
                            dpr={Math.min(window.devicePixelRatio, 1.5)} // Caps performance for integrated graphics
                            camera={{ position: [0, 0, 15], fov: 45 }}
                            gl={{ antialias: true, alpha: false }} // alpha false prevents heavy clear
                        >
                            <color attach="background" args={['#020617']} />
                            
                            {/* Zero lights needed! All materials are meshBasicMaterial/lineBasicMaterial with vertexColors */}
                            <Scene />
                        </Canvas>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
