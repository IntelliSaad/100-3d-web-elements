<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Procedural Snow Ambient Background</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: {
                            900: '#070b19', // Deep winter night sky
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; background-color: #070b19; color: white; overflow: hidden; font-family: 'Inter', sans-serif; }
        #root { width: 100vw; height: 100vh; position: relative; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Imports -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "three": "https://esm.sh/three@0.160.0",
            "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.14?external=react,react-dom,three"
        }
    }
    </script>

    <script>
        // Suppress warnings for clean devtools
        const origWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && (args[0].includes('in-browser Babel transformer') || args[0].includes('cdn.tailwindcss.com should not be used in production'))) return;
            origWarn.apply(console, args);
        };
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-type="module">
        import React, { useRef, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import * as THREE from 'three';
        import { Canvas, useFrame, useThree } from '@react-three/fiber';

        const NUM_FLAKES = 10000; // Hyper-dense snowfall, extreme performance

        const SnowyEnvironment = () => {
            const meshRef = useRef();

            // Setup buffers outside the render loop
            const { positions, velocities, scales, dummy } = useMemo(() => {
                const pos = new Float32Array(NUM_FLAKES * 3);
                const vel = new Float32Array(NUM_FLAKES * 3); // x=drift, y=fall speed, z=swirl
                const scales = new Float32Array(NUM_FLAKES);
                
                for(let i = 0; i < NUM_FLAKES; i++) {
                    // Spread flakes across a huge 100x100x100 volume
                    pos[i*3] = (Math.random() - 0.5) * 100;
                    pos[i*3+1] = (Math.random() - 0.5) * 100;
                    pos[i*3+2] = (Math.random() - 0.5) * 100;
                    
                    // Fall speed and drift
                    vel[i*3] = (Math.random() - 0.5) * 0.5; // X drift
                    vel[i*3+1] = 0.5 + Math.random() * 1.5; // Y fall speed
                    vel[i*3+2] = (Math.random() - 0.5) * 0.5; // Z swirl
                    
                    // Random flake sizing
                    scales[i] = 0.5 + Math.random() * 1.5;
                }

                return { positions: pos, velocities: vel, scales, dummy: new THREE.Object3D() };
            }, []);

            useFrame((state, delta) => {
                const time = state.clock.elapsedTime;
                
                // Directly mutate Float32Arrays for extreme integrated graphics performance
                for(let i = 0; i < NUM_FLAKES; i++) {
                    const i3 = i * 3;
                    
                    // Apply downward velocity
                    positions[i3+1] -= velocities[i3+1] * delta * 5;
                    
                    // Add wind/oscillation drift based on time and unique velocities
                    const windX = Math.sin(time * 0.5 + positions[i3+1] * 0.05) * velocities[i3];
                    const windZ = Math.cos(time * 0.5 + positions[i3+1] * 0.05) * velocities[i3+2];
                    
                    positions[i3] += windX * delta * 15;
                    positions[i3+2] += windZ * delta * 15;

                    // If a snowflake hits the "ground" (-50), instantly teleport it to the "sky" (+50)
                    if (positions[i3+1] < -50) {
                        positions[i3+1] = 50;
                        positions[i3] = (Math.random() - 0.5) * 100;
                        positions[i3+2] = (Math.random() - 0.5) * 100;
                    }

                    // Update dummy matrix
                    dummy.position.set(positions[i3], positions[i3+1], positions[i3+2]);
                    
                    // Slight spinning of the flakes
                    dummy.rotation.x += delta * velocities[i3+1];
                    dummy.rotation.y += delta * velocities[i3+2];
                    
                    dummy.scale.setScalar(scales[i] * 0.04);
                    dummy.updateMatrix();
                    
                    meshRef.current.setMatrixAt(i, dummy.matrix);
                }

                // Push buffer update
                meshRef.current.instanceMatrix.needsUpdate = true;
            });

            return (
                <instancedMesh ref={meshRef} args={[null, null, NUM_FLAKES]}>
                    <dodecahedronGeometry args={[1, 0]} />
                    {/* Additive blending makes the snow look soft and glowing */}
                    <meshBasicMaterial 
                        color="#ffffff" 
                        transparent 
                        opacity={0.6} 
                        blending={THREE.AdditiveBlending} 
                        depthWrite={false} 
                    />
                </instancedMesh>
            );
        };

        const Scene = () => {
            const { camera, pointer } = useThree();

            // Gently tie camera rotation to mouse coordinates for immersive looking around
            useFrame(() => {
                camera.rotation.y += (pointer.x * 0.5 - camera.rotation.y) * 0.05;
                camera.rotation.x += (-pointer.y * 0.2 - camera.rotation.x) * 0.05;
            });

            return (
                <group>
                    <SnowyEnvironment />
                </group>
            );
        };

        const App = () => {
            return (
                <div className="w-full h-screen bg-navy-900 flex flex-col items-center justify-center relative touch-none">
                    {/* Minimalist Watermark/Aesthetic Text */}
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none z-10 flex flex-col items-center select-none text-center">
                        <h1 className="text-white/80 tracking-[0.4em] text-4xl md:text-6xl font-light mb-4 drop-shadow-lg">
                            WINTER <span className="font-bold">MUTE</span>
                        </h1>
                        <div className="w-16 h-[1px] bg-white/30 mb-4"></div>
                        <p className="text-white/40 font-mono text-xs tracking-[0.3em] uppercase">10,000 Particle Render</p>
                    </div>

                    <div className="w-full h-full cursor-crosshair">
                        {/* 
                          Important Performance Setup: 
                          - camera=[0,0,0] sits INSIDE the storm.
                          - dpr capped to 1.5 prevents integrated GPUs from choking on high-res Macbook/Windows screens.
                          - alpha=false prevents expensive frame-clears.
                        */}
                        <Canvas dpr={Math.min(window.devicePixelRatio, 1.5)} camera={{ position: [0, 0, 0], fov: 60, near: 0.1, far: 80 }} gl={{ antialias: false, alpha: false }}>
                            {/* Deep indigo/navy background color */}
                            <color attach="background" args={['#070b19']} />
                            
                            {/* Fog hides the flakes popping out at the top/bottom bounds wrapping edges */}
                            <fog attach="fog" args={['#070b19', 10, 50]} />
                            
                            <Scene />
                        </Canvas>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
