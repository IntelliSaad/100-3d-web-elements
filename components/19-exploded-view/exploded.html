<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactile 3D Pricing Toggle</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neutral: {
                            950: '#0a0a0a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; background-color: #0a0a0a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React, ReactDOM, and Framer Motion via ESM -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@11.0.8?external=react,react-dom",
            "three": "https://esm.sh/three@0.160.0",
            "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.14?external=react,react-dom,three"
        }
    }
    </script>

    <!-- Babel for JSX -->
    <script>
        // Suppress Babel / Tailwind CDN warnings for clean devtools
        const origWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && (args[0].includes('in-browser Babel transformer') || args[0].includes('cdn.tailwindcss.com should not be used in production'))) return;
            origWarn.apply(console, args);
        };
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-type="module">
        import React, { useRef, useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Canvas, useThree } from '@react-three/fiber';
        import { useSpring } from 'framer-motion';

        const Toggle3D = ({ isAnnual, onToggle }) => {
            const { invalidate } = useThree();
            const sphereRef = useRef();

            // Setup Framer Motion spring physics for the toggle slide
            // Left position: -1.2, Right position: 1.2
            const targetX = isAnnual ? 1.2 : -1.2;
            const springX = useSpring(targetX, { stiffness: 500, damping: 30, mass: 1 });

            // Apply new target when state changes
            useEffect(() => {
                springX.set(targetX);
            }, [targetX, springX]);

            // Bind the spring directly to the Threejs mesh position and force canvas renders ONLY while moving
            useEffect(() => {
                const unsub = springX.on('change', (v) => {
                    if (sphereRef.current) {
                        sphereRef.current.position.x = v;
                    }
                    // Crucial for performance: invalidate the canvas manually while the animation is running
                    invalidate();
                });
                return () => unsub();
            }, [springX, invalidate]);

            return (
                <group 
                    onClick={onToggle}
                    onPointerEnter={() => { document.body.style.cursor = 'pointer'; }}
                    onPointerLeave={() => { document.body.style.cursor = 'default'; }}
                >
                    {/* The Recessed Track */}
                    <mesh rotation={[0, 0, Math.PI / 2]} receiveShadow>
                        {/* radius, length, capSegments, radialSegments */}
                        <capsuleGeometry args={[0.8, 2.4, 16, 32]} />
                        <meshStandardMaterial color="#1a1a1a" roughness={0.9} />
                    </mesh>

                    {/* The Physical Switch */}
                    <mesh ref={sphereRef} position={[-1.2, 0, 0.4]} castShadow>
                        {/* radius, widthSegments, heightSegments (kept low for performance) */}
                        <sphereGeometry args={[0.92, 32, 32]} />
                        <meshStandardMaterial 
                            color={isAnnual ? "#3b82f6" : "#f1f5f9"} 
                            roughness={0.15} 
                            metalness={0.1}
                        />
                    </mesh>
                </group>
            );
        };

        const PricingPanel = () => {
            const [isAnnual, setIsAnnual] = useState(false);
            
            const handleToggle = () => setIsAnnual(!isAnnual);

            return (
                <div className="flex flex-col items-center p-10 bg-neutral-900/50 backdrop-blur-xl rounded-3xl border border-neutral-800 shadow-2xl">
                    <div className="text-center mb-10">
                        <h2 className="text-3xl font-bold text-white mb-3">Select your billing</h2>
                        <p className="text-neutral-400">Save up to 20% by paying annually.</p>
                    </div>

                    <div className="flex items-center gap-6 mb-8">
                        <span 
                            onClick={() => setIsAnnual(false)}
                            className={`text-lg transition-colors font-medium cursor-pointer ${!isAnnual ? 'text-white' : 'text-neutral-500 hover:text-neutral-300'}`}
                        >
                            Monthly
                        </span>

                        {/* Highly Optimized WebGL Container */}
                        <div className="w-[140px] h-[70px]">
                            <Canvas frameloop="demand" camera={{ position: [0, 0, 6], fov: 40 }} shadows dpr={[1, 1.5]}>
                                <ambientLight intensity={0.6} />
                                {/* Main light positioned directly above the switch for realistic track shadowing */}
                                <pointLight position={[0, 4, 3]} intensity={25} color="#ffffff" castShadow shadow-mapSize={[512, 512]} />
                                
                                <Toggle3D isAnnual={isAnnual} onToggle={handleToggle} />
                            </Canvas>
                        </div>

                        <span 
                            onClick={() => setIsAnnual(true)}
                            className={`text-lg transition-colors font-medium cursor-pointer ${isAnnual ? 'text-white' : 'text-neutral-500 hover:text-neutral-300'}`}
                        >
                            Annually
                            {isAnnual && (
                                <span className="absolute ml-2 mt-0.5 px-2 py-0.5 text-[10px] font-bold tracking-widest text-blue-900 bg-blue-400 rounded-full uppercase">
                                    Saved 20%
                                </span>
                            )}
                        </span>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<PricingPanel />);
    </script>
</body>
</html>
