<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural Shape-Shifting Swarm</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            950: '#020617',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; background-color: #020617; color: white; overflow: hidden; font-family: 'Inter', sans-serif; }
        #root { width: 100vw; height: 100vh; position: relative; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Imports -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "three": "https://esm.sh/three@0.160.0",
            "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.14?external=react,react-dom,three"
        }
    }
    </script>

    <script>
        // Suppress warnings for clean devtools
        const origWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && (args[0].includes('in-browser Babel transformer') || args[0].includes('cdn.tailwindcss.com should not be used in production'))) return;
            origWarn.apply(console, args);
        };
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-type="module">
        import React, { useRef, useMemo, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import * as THREE from 'three';
        import { Canvas, useFrame, useThree } from '@react-three/fiber';

        const NUM = 3000; // Hyper-dense particle count running flawlessly at 60fps

        // Shape Generators (returns raw Float32Arrays for extreme JS performance)
        const getSphereTargets = () => {
            const pos = new Float32Array(NUM * 3);
            const col = new Float32Array(NUM * 3);
            const c1 = new THREE.Color("#0ea5e9"); // Cyan
            const c2 = new THREE.Color("#fcd34d"); // Warm Sun Yellow
            const phi = Math.PI * (3 - Math.sqrt(5));
            for(let i=0; i<NUM; i++) {
                const y = 1 - (i / (NUM - 1)) * 2;
                // Add soft fuzz to the radius for a glowing cloud effect
                const radius = Math.sqrt(1 - y * y) * (7 + (Math.random() - 0.5)); 
                const theta = phi * i;
                
                pos[i*3] = Math.cos(theta) * radius;
                pos[i*3+1] = y * (7 + (Math.random() - 0.5));
                pos[i*3+2] = Math.sin(theta) * radius;

                const mixed = c1.clone().lerp(c2, (y + 1)/2);
                col[i*3] = mixed.r; col[i*3+1] = mixed.g; col[i*3+2] = mixed.b;
            }
            return { pos, col };
        };

        const getTorusTargets = () => {
            const pos = new Float32Array(NUM * 3);
            const col = new Float32Array(NUM * 3);
            const c1 = new THREE.Color("#ec4899"); // Pink
            const c2 = new THREE.Color("#8b5cf6"); // Purple
            for(let i=0; i<NUM; i++) {
                const t = (i / NUM) * Math.PI * 2;
                const p = 3; const q = 4;
                const r = Math.cos(q * t) + 2;
                
                const spread = 1.0; // Thickness of the tube
                pos[i*3] = (r * Math.cos(p * t)) * 2.5 + (Math.random()-0.5)*spread;
                pos[i*3+1] = (r * Math.sin(p * t)) * 2.5 + (Math.random()-0.5)*spread;
                pos[i*3+2] = (-Math.sin(q * t)) * 2.5 + (Math.random()-0.5)*spread;

                const mixed = c1.clone().lerp(c2, Math.random()); // Shimmering gradient
                col[i*3] = mixed.r; col[i*3+1] = mixed.g; col[i*3+2] = mixed.b;
            }
            return { pos, col };
        };

        const getCubeTargets = () => {
            const pos = new Float32Array(NUM * 3);
            const col = new Float32Array(NUM * 3);
            const c1 = new THREE.Color("#10b981"); // Emerald
            const c2 = new THREE.Color("#0284c7"); // Ocean Blue
            const side = Math.ceil(Math.cbrt(NUM));
            for(let i=0; i<NUM; i++) {
                const x = (i % side) - side/2;
                const y = (Math.floor(i / side) % side) - side/2;
                const z = (Math.floor(i / (side * side))) - side/2;
                
                // Add tiny jitter to make it feel "organic"
                const jitter = 0.2;
                pos[i*3] = x * 1.5 + (Math.random()-0.5)*jitter;
                pos[i*3+1] = y * 1.5 + (Math.random()-0.5)*jitter;
                pos[i*3+2] = z * 1.5 + (Math.random()-0.5)*jitter;

                const mixed = c1.clone().lerp(c2, (x + side/2)/side);
                col[i*3] = mixed.r; col[i*3+1] = mixed.g; col[i*3+2] = mixed.b;
            }
            return { pos, col };
        };

        const getGalaxyTargets = () => {
            const pos = new Float32Array(NUM * 3);
            const col = new Float32Array(NUM * 3);
            const c1 = new THREE.Color("#f97316"); // Orange
            const c2 = new THREE.Color("#eab308"); // Gold
            const arms = 5;
            for(let i=0; i<NUM; i++) {
                const armIndex = i % arms;
                const r = Math.random() * 18;
                const angle = r * 0.4 + (armIndex * Math.PI * 2 / arms) + (Math.random() - 0.5)*0.5;
                
                pos[i*3] = Math.cos(angle) * r;
                pos[i*3+1] = (Math.random() - 0.5) * (18 - r) * 0.25; // Bulge at center
                pos[i*3+2] = Math.sin(angle) * r;

                const mixed = c1.clone().lerp(c2, r/18);
                col[i*3] = mixed.r; col[i*3+1] = mixed.g; col[i*3+2] = mixed.b;
            }
            return { pos, col };
        };

        const MorphingSwarm = () => {
            const meshRef = useRef();
            const groupRef = useRef();

            // Store heavily optimized memory buffers
            const { buffers, shapes } = useMemo(() => {
                const shapes = [getSphereTargets(), getTorusTargets(), getCubeTargets(), getGalaxyTargets()];
                
                // Active buffers that get rendered
                const currentPos = new Float32Array(shapes[0].pos);
                const currentCol = new Float32Array(shapes[0].col);

                return { buffers: { currentPos, currentCol }, shapes };
            }, []);

            const dummy = useMemo(() => new THREE.Object3D(), []);

            useFrame((state, delta) => {
                const time = state.clock.elapsedTime;
                
                // 1. Logic Phase: Calculate current target shape (switches every 4 seconds)
                const phaseTime = 4;
                const activePhase = Math.floor(time / phaseTime) % 4;
                const targetPos = shapes[activePhase].pos;
                const targetCol = shapes[activePhase].col;

                const { currentPos, currentCol } = buffers;

                // 2. High-Speed Fluid Mutator: Smoothly lerp towards active targets
                const LERP_SPEED = Math.min(0.08, delta * 5); // snappy but buttery smooth

                for(let i=0; i<NUM; i++) {
                    const i3 = i * 3;
                    
                    // Seamless hardware morphing 
                    currentPos[i3] += (targetPos[i3] - currentPos[i3]) * LERP_SPEED;
                    currentPos[i3+1] += (targetPos[i3+1] - currentPos[i3+1]) * LERP_SPEED;
                    currentPos[i3+2] += (targetPos[i3+2] - currentPos[i3+2]) * LERP_SPEED;

                    currentCol[i3] += (targetCol[i3] - currentCol[i3]) * LERP_SPEED;
                    currentCol[i3+1] += (targetCol[i3+1] - currentCol[i3+1]) * LERP_SPEED;
                    currentCol[i3+2] += (targetCol[i3+2] - currentCol[i3+2]) * LERP_SPEED;

                    // Add organic, localized noise/breathing
                    let yOffset = 0;
                    if (activePhase === 2) {
                        // The 'Cube' phase breathes like an undulating data-wave
                        yOffset = Math.sin(time * 3 + currentPos[i3] * 0.5) * 1.5;
                    }

                    dummy.position.set(currentPos[i3], currentPos[i3+1] + yOffset, currentPos[i3+2]);
                    
                    // Calculate individual sizes based on distance to core for the galaxy phase
                    let scale = 1;
                    if(activePhase === 3) {
                        scale = Math.max(0.2, 2.0 - dummy.position.length() * 0.1);
                    }
                    dummy.scale.setScalar(scale);

                    dummy.updateMatrix();
                    meshRef.current.setMatrixAt(i, dummy.matrix);
                }

                // Push buffers to GPU in a single massive dump
                meshRef.current.instanceMatrix.needsUpdate = true;
                meshRef.current.geometry.attributes.color.needsUpdate = true;

                // Rotate the entire swarm continuously
                if (groupRef.current) {
                    groupRef.current.rotation.y += delta * 0.2;
                    groupRef.current.rotation.x = Math.sin(time * 0.2) * 0.2;
                }
            });

            return (
                <group ref={groupRef}>
                    <instancedMesh ref={meshRef} args={[null, null, NUM]}>
                        {/* We use dodecahedron because 12 flat faces catch lighting angles better than perfect spheres while being massively cheaper on draw-call limits */}
                        <dodecahedronGeometry args={[0.07, 0]}>
                            <instancedBufferAttribute attach="attributes-color" args={[buffers.currentCol, 3]} />
                        </dodecahedronGeometry>
                        <meshBasicMaterial 
                            vertexColors 
                            toneMapped={false} 
                            blending={THREE.AdditiveBlending} 
                            depthWrite={false} 
                            transparent 
                            opacity={0.85} // prevents burn-out
                        />
                    </instancedMesh>
                </group>
            );
        };

        const Scene = () => {
            const { camera, pointer } = useThree();

            // Extremely subtle Parallax background tracking
            useFrame(() => {
                camera.position.x += (pointer.x * 6 - camera.position.x) * 0.05;
                camera.position.y += (pointer.y * 6 - camera.position.y) * 0.05;
                camera.lookAt(0, 0, 0);
            });

            return <MorphingSwarm />;
        };

        const App = () => {
            return (
                <div className="w-full h-screen bg-slate-950 flex flex-col items-center justify-center relative touch-none">
                    <div className="w-full h-full cursor-crosshair">
                        {/* Render target resolution bounded to 1.5x pixel ratio for locked 60fps on integrated graphics */}
                        <Canvas dpr={Math.min(window.devicePixelRatio, 1.5)} camera={{ position: [0, 0, 22], fov: 45 }} gl={{ antialias: true, alpha: false }}>
                            <color attach="background" args={['#020617']} />
                            <Scene />
                        </Canvas>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
