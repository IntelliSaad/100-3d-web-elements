<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformative Procedural DNA sequence</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            950: '#020617',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; background-color: #020617; color: white; overflow: hidden; font-family: 'Inter', sans-serif; }
        #root { width: 100vw; height: 100vh; position: relative; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Imports -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "three": "https://esm.sh/three@0.160.0",
            "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.14?external=react,react-dom,three"
        }
    }
    </script>

    <script>
        const origWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && (args[0].includes('in-browser Babel transformer') || args[0].includes('cdn.tailwindcss.com should not be used in production'))) return;
            origWarn.apply(console, args);
        };
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-type="module">
        import React, { useRef, useMemo, useEffect, useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import * as THREE from 'three';
        import { Canvas, useFrame, useThree } from '@react-three/fiber';

        const PARTICLE_COUNT = 400; // per strand, 800 total
        const STRAND_RADIUS = 2.0;
        const HEIGHT_SPREAD = 0.05;
        const FREQUENCY = 0.4;
        const TOTAL_LOOP = 15; // Represents the 4-phase 15-second loop

        // Lightweight interpolation physics
        const easeInOutCubic = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        const easeOutQuad = t => t * (2 - t);

        const TransformativeDNA = () => {
            const instancedMeshRef = useRef();
            const linesRef = useRef();
            const groupRef = useRef();

            const { basePositions, chaosPositions, colors, lineIndices, posArray, colArray } = useMemo(() => {
                const basePositions = [];
                const chaosPositions = [];
                const colors = [];
                const lineIndices = [];

                const color1 = new THREE.Color("#0bd3d3"); // Cyan
                const color2 = new THREE.Color("#f890e7"); // Magenta

                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    const t = i * FREQUENCY;
                    const y = (i - PARTICLE_COUNT / 2) * HEIGHT_SPREAD; // Spread evenly on Y axis
                    const normalizedY = i / PARTICLE_COUNT;
                    
                    // Strand 1
                    const x1 = Math.cos(t) * STRAND_RADIUS;
                    const z1 = Math.sin(t) * STRAND_RADIUS;
                    basePositions.push({ x: x1, y, z: z1, strand: 0, normalizedY });
                    colors.push(color1.r, color1.g, color1.b);

                    // Strand 2
                    const x2 = Math.cos(t + Math.PI) * STRAND_RADIUS;
                    const z2 = Math.sin(t + Math.PI) * STRAND_RADIUS;
                    basePositions.push({ x: x2, y, z: z2, strand: 1, normalizedY });
                    colors.push(color2.r, color2.g, color2.b);

                    // Random chaotic destinations mapped for phase 3
                    chaosPositions.push({
                        x: (Math.random() - 0.5) * 40,
                        y: y + (Math.random() - 0.5) * 20,
                        z: (Math.random() - 0.5) * 40,
                        speed: 0.2 + Math.random() * 0.8
                    });
                    chaosPositions.push({
                        x: (Math.random() - 0.5) * 40,
                        y: y + (Math.random() - 0.5) * 20,
                        z: (Math.random() - 0.5) * 40,
                        speed: 0.2 + Math.random() * 0.8
                    });

                    // Add base pairs (lines) every 4 particles
                    if (i % 4 === 0) {
                        const idx1 = i * 2;
                        const idx2 = i * 2 + 1;
                        lineIndices.push({ idx1, idx2, normalizedY });
                    }
                }

                const numPairs = lineIndices.length;
                const posArray = new Float32Array(numPairs * 6);
                const colArray = new Float32Array(numPairs * 6);

                return { basePositions, chaosPositions, colors: new Float32Array(colors), lineIndices, posArray, colArray };
            }, []);

            const tempObject = useMemo(() => new THREE.Object3D(), []);

            useFrame((state) => {
                const time = state.clock.elapsedTime;
                
                // Continuous slow rotation
                if (groupRef.current) {
                    groupRef.current.rotation.y = time * 0.2;
                }

                const loopTime = time % TOTAL_LOOP; // 0 to 15 seconds

                const cyan = new THREE.Color("#0bd3d3");
                const magenta = new THREE.Color("#f890e7");

                // Update particles
                for (let i = 0; i < basePositions.length; i++) {
                    const base = basePositions[i];
                    const chaos = chaosPositions[i];
                    
                    let explosionProgress = 0;
                    
                    // Phase State Machine
                    // 0-5s: Idle (progress = 0)
                    // 5-8s: Explode bottom-up ripple
                    // 8-12s: Chaos drifting
                    // 12-15s: Re-assemble smoothly
                    
                    if (loopTime >= 5 && loopTime < 8) {
                        const rawT = (loopTime - 5) / 3; 
                        const delay = base.normalizedY * 0.6; // Bottom-up delay up to 0.6
                        const p = Math.max(0, Math.min(1, (rawT - delay) / 0.4));
                        explosionProgress = easeOutQuad(p);
                    } else if (loopTime >= 8 && loopTime < 12) {
                        explosionProgress = 1;
                    } else if (loopTime >= 12 && loopTime < 15) {
                        const rawT = (loopTime - 12) / 3;
                        // Everyone assembles universally together for a dramatic snap
                        explosionProgress = 1 - easeInOutCubic(Math.min(1, rawT));
                    }

                    // Float organically while in chaos based on node's unique speed matrix
                    const chaosOscillation = (Math.sin(time * chaos.speed + i) * 2) * explosionProgress;
                    
                    const curX = THREE.MathUtils.lerp(base.x, chaos.x + chaosOscillation, explosionProgress);
                    const curY = THREE.MathUtils.lerp(base.y, chaos.y + chaosOscillation, explosionProgress);
                    const curZ = THREE.MathUtils.lerp(base.z, chaos.z + chaosOscillation, explosionProgress);

                    tempObject.position.set(curX, curY, curZ);

                    // GSAP-like dynamic scaling effect during the explosion shockwave (scale bursts up, drops down)
                    let scale = 1;
                    if (loopTime >= 5 && loopTime < 8) {
                        const rawT = (loopTime - 5) / 3;
                        const delay = base.normalizedY * 0.6;
                        const p = Math.max(0, Math.min(1, (rawT - delay) / 0.4));
                        if (p > 0 && p < 1) scale = 1 + Math.sin(p * Math.PI) * 2; // Expand dramatically
                    } else if (loopTime >= 12 && loopTime < 15) {
                         const rawT = (loopTime - 12) / 3;
                         const p = Math.min(1, rawT);
                         scale = Math.max(0.01, 1 - Math.sin(p * Math.PI) * 0.5); // Shrink slightly before re-attachment
                    }
                    tempObject.scale.setScalar(scale);
                    
                    tempObject.updateMatrix();
                    instancedMeshRef.current.setMatrixAt(i, tempObject.matrix);

                    // Store current positions so the line segments can track them
                    base.currentX = curX;
                    base.currentY = curY;
                    base.currentZ = curZ;
                }
                
                instancedMeshRef.current.instanceMatrix.needsUpdate = true;

                // Update Line Segment Rungs
                let pairIndex = 0;
                for (const conn of lineIndices) {
                    const p1 = basePositions[conn.idx1];
                    const p2 = basePositions[conn.idx2];

                    posArray[pairIndex * 6 + 0] = p1.currentX;
                    posArray[pairIndex * 6 + 1] = p1.currentY;
                    posArray[pairIndex * 6 + 2] = p1.currentZ;
                    posArray[pairIndex * 6 + 3] = p2.currentX;
                    posArray[pairIndex * 6 + 4] = p2.currentY;
                    posArray[pairIndex * 6 + 5] = p2.currentZ;

                    // Fade out the base pairs during the explosion ripple
                    let opacity = 0.5;
                    if (loopTime >= 5 && loopTime < 8) {
                        const rawT = (loopTime - 5) / 3;
                        const delay = conn.normalizedY * 0.6;
                        opacity = 0.5 * (1 - Math.max(0, Math.min(1, (rawT - delay) / 0.4)));
                    } else if (loopTime >= 8 && loopTime < 12) {
                        opacity = 0;
                    } else if (loopTime >= 12 && loopTime < 15) {
                        const rawT = (loopTime - 12) / 3;
                        opacity = 0.5 * easeInOutCubic(Math.min(1, rawT));
                    }

                    // Apply transparency natively via vertex colors
                    colArray[pairIndex * 6 + 0] = cyan.r * opacity;
                    colArray[pairIndex * 6 + 1] = cyan.g * opacity;
                    colArray[pairIndex * 6 + 2] = cyan.b * opacity;
                    colArray[pairIndex * 6 + 3] = magenta.r * opacity;
                    colArray[pairIndex * 6 + 4] = magenta.g * opacity;
                    colArray[pairIndex * 6 + 5] = magenta.b * opacity;

                    pairIndex++;
                }

                // Push highly optimized buffer updates instantly
                linesRef.current.geometry.attributes.position.needsUpdate = true;
                linesRef.current.geometry.attributes.color.needsUpdate = true;
            });

            return (
                <group ref={groupRef}>
                    <instancedMesh ref={instancedMeshRef} args={[null, null, PARTICLE_COUNT * 2]}>
                        <sphereGeometry args={[0.08, 8, 8]}>
                            <instancedBufferAttribute attach="attributes-color" args={[colors, 3]} />
                        </sphereGeometry>
                        {/* Additive blending makes particles look like glowing energy sources without heavy lights */}
                        <meshBasicMaterial vertexColors toneMapped={false} blending={THREE.AdditiveBlending} depthWrite={false} transparent />
                    </instancedMesh>

                    <lineSegments ref={linesRef}>
                        <bufferGeometry>
                            <bufferAttribute attach="attributes-position" count={posArray.length / 3} array={posArray} itemSize={3} usage={THREE.DynamicDrawUsage} />
                            <bufferAttribute attach="attributes-color" count={colArray.length / 3} array={colArray} itemSize={3} usage={THREE.DynamicDrawUsage} />
                        </bufferGeometry>
                        <lineBasicMaterial vertexColors toneMapped={false} blending={THREE.AdditiveBlending} transparent depthWrite={false} />
                    </lineSegments>
                </group>
            );
        };

        const Scene = () => {
            const { camera, pointer } = useThree();
            const groupRef = useRef();

            // Performant damped Parallax tracking
            useFrame(() => {
                const targetX = pointer.x * 5;
                const targetY = pointer.y * 5;
                camera.position.x += (targetX - camera.position.x) * 0.05;
                camera.position.y += (targetY - camera.position.y) * 0.05;
                camera.lookAt(0, 0, 0);
            });

            return (
                <group ref={groupRef}>
                    <TransformativeDNA />
                </group>
            );
        };

        const App = () => {
            return (
                <div className="w-full h-screen bg-slate-950 flex flex-col items-center justify-center relative touch-none">
                    <div className="w-full h-full cursor-crosshair">
                        <Canvas dpr={Math.min(window.devicePixelRatio, 1.5)} camera={{ position: [0, 0, 18], fov: 45 }} gl={{ antialias: true, alpha: false }}>
                            <color attach="background" args={['#020617']} />
                            <Scene />
                        </Canvas>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
