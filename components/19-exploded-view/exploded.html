<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Holographic Developer Badge</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neutral: {
                            950: '#0a0a0a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; background-color: #0a0a0a; color: white; overflow: hidden; touch-action: none; }
        #root { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        .glass-hint {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 9999px;
            padding: 8px 16px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React, ReactDOM, and Framer Motion via ESM -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@11.0.8?external=react,react-dom",
            "three": "https://esm.sh/three@0.160.0",
            "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.14?external=react,react-dom,three",
            "@react-three/drei": "https://esm.sh/@react-three/drei@9.96.1?external=react,react-dom,three,@react-three/fiber"
        }
    }
    </script>

    <!-- Babel for JSX -->
    <script>
        // Suppress Babel / Tailwind CDN warnings for clean devtools
        const origWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && (args[0].includes('in-browser Babel transformer') || args[0].includes('cdn.tailwindcss.com should not be used in production'))) return;
            origWarn.apply(console, args);
        };
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-type="module">
        import React, { useRef, useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, useMotionValue, useSpring, useTransform } from 'framer-motion';
        import { Canvas, useFrame, useThree } from '@react-three/fiber';
        import { RoundedBox, MeshTransmissionMaterial, Text, Environment } from '@react-three/drei';

        const Badge = ({ mouseX, mouseY, isHovered }) => {
            const groupRef = useRef();
            const { invalidate } = useThree();
            
            // Physical spring physics to smooth out the mouse tracking
            const springConfig = { damping: 20, stiffness: 120, mass: 0.5 };
            const springX = useSpring(mouseX, springConfig);
            const springY = useSpring(mouseY, springConfig);
            
            // Map the normalized -0.5 to 0.5 mouse bounds into rotation radians (max ~17 degrees)
            const rotationX = useTransform(springY, [-0.5, 0.5], [-0.3, 0.3]);
            const rotationY = useTransform(springX, [-0.5, 0.5], [0.3, -0.3]);

            // Gentle levitation physics (only active rendering when hovered)
            useFrame((state, delta) => {
                if (isHovered) {
                    invalidate(); // Keep frameloop active while bobbing
                    const t = state.clock.getElapsedTime();
                    // Subtle bob up and down
                    groupRef.current.position.y = Math.sin(t * 1.5) * 0.12;
                } else {
                    // Smoothly decay back to origin when mouse leaves
                    groupRef.current.position.y += (0 - groupRef.current.position.y) * delta * 4;
                    if (Math.abs(groupRef.current.position.y) > 0.001) invalidate();
                }
            });

            // Bind framer motion values to the WebGL rotation and aggressively invalidate to trigger paints
            useEffect(() => {
                const unsubX = rotationX.on('change', (v) => {
                    if (groupRef.current) groupRef.current.rotation.x = v;
                    invalidate();
                });
                const unsubY = rotationY.on('change', (v) => {
                    if (groupRef.current) groupRef.current.rotation.y = v;
                    invalidate();
                });
                return () => { unsubX(); unsubY(); };
            }, [rotationX, rotationY, invalidate]);

            // Memoize the deterministic barcode layout
            const barcode = React.useMemo(() => {
                return Array.from({length: 14}).map((_, i) => ({
                    w: 0.02 + Math.random() * 0.04,
                    x: -0.7 + i * 0.11
                }));
            }, []);

            return (
                <group ref={groupRef}>
                    {/* The Physical Acrylic Block */}
                    <RoundedBox args={[3.0, 4.6, 0.5]} radius={0.15} smoothness={4}>
                        <MeshTransmissionMaterial 
                            roughness={0.2}
                            transmission={1}
                            thickness={1.5}
                            chromaticAberration={0.06}
                            iridescence={0.4}
                            iridescenceIOR={1.3}
                            clearcoat={1}
                            color="#fff"
                            background={new React.Suspense()}
                        />
                    </RoundedBox>
                    
                    {/* Inner Holographic Content 
                        Positioning at Z=0 places this safely inside the physical thickness of the glass
                        so the transmission shader physically refracts the font */}
                    <group position={[0, 0, 0]}>
                        <Text position={[0, 1.3, 0]} fontSize={0.18} color="#8b5cf6" anchorX="center" anchorY="middle" letterSpacing={0.25} font="https://fonts.gstatic.com/s/inter/v12/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuLyeMZhrib2Bg-4.ttf">
                            DEVELOPER
                        </Text>
                        
                        <Text position={[0, 0.3, 0]} fontSize={0.8} color="#ffffff" anchorX="center" anchorY="middle" fontWeight={800} font="https://fonts.gstatic.com/s/inter/v12/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuLyeMZhrib2Bg-4.ttf">
                            LEVEL 99
                        </Text>
                        
                        <Text position={[0, -0.6, 0]} fontSize={0.11} color="#a3a3a3" anchorX="center" anchorY="middle" letterSpacing={0.35} font="https://fonts.gstatic.com/s/inter/v12/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuLyeMZhrib2Bg-4.ttf">
                            GUEST PASS INC.
                        </Text>

                        {/* Faux Barcode Identifier */}
                        <group position={[0, -1.4, 0]}>
                            {barcode.map((b, i) => (
                                <mesh key={i} position={[b.x, 0, 0]}>
                                    <planeGeometry args={[b.w, 0.25]} />
                                    <meshBasicMaterial color="#ffffff" transparent opacity={0.5} />
                                </mesh>
                            ))}
                        </group>
                    </group>
                </group>
            );
        };

        const App = () => {
            const containerRef = useRef();
            const mouseX = useMotionValue(0);
            const mouseY = useMotionValue(0);
            const [isHovered, setIsHovered] = useState(false);

            const handleMouseMove = (e) => {
                if(!containerRef.current) return;
                const rect = containerRef.current.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                mouseX.set(x / rect.width);
                mouseY.set(y / rect.height);
            };

            const handleMouseLeave = () => {
                setIsHovered(false);
                mouseX.set(0);
                mouseY.set(0);
            };

            const handleMouseEnter = () => setIsHovered(true);

            return (
                <div 
                    ref={containerRef}
                    className="w-full h-screen bg-neutral-950 flex flex-col items-center justify-center relative touch-none"
                    onMouseMove={handleMouseMove}
                    onMouseLeave={handleMouseLeave}
                    onMouseEnter={handleMouseEnter}
                >
                    {/* UI HUD Overlay */}
                    <div className="absolute top-12 left-1/2 -translate-x-1/2 flex flex-col items-center pointer-events-none z-10">
                        <h1 className="text-white/80 tracking-[0.3em] text-xs uppercase font-bold mb-3">Security Clearance</h1>
                        <div className="glass-hint">
                            <p className="text-white/60 text-[10px] uppercase tracking-widest">Hover to levitate & scan</p>
                        </div>
                    </div>

                    <div className="absolute bottom-12 left-1/2 -translate-x-1/2 pointer-events-none">
                        <p className="font-mono text-[10px] text-neutral-600 tracking-wider">SECURE-LINK-0x88FF</p>
                    </div>

                    {/* Highly Optimized R3F Scene */}
                    <div className="w-full h-full cursor-crosshair">
                        <Canvas frameloop="demand" camera={{ position: [0, 0, 6], fov: 45 }} dpr={[1, 1.5]}>
                            <ambientLight intensity={0.5} />
                            
                            {/* Directional styling lights to highlight the glass bevels */}
                            <spotLight position={[10, 10, 5]} angle={0.2} penumbra={1} intensity={2} color="#ffffff" />
                            <spotLight position={[-10, -10, 5]} angle={0.2} penumbra={1} intensity={1} color="#8b5cf6" />
                            
                            {/* Extremely cheap, low-res Environment map for realistic glass reflection */}
                            <Environment preset="city" resolution={128} />
                            
                            <Badge mouseX={mouseX} mouseY={mouseY} isHovered={isHovered} />
                        </Canvas>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
