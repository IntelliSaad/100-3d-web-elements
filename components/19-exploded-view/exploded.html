<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite 4-Phase WebGL Background</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            950: '#020617',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; background-color: #020617; color: white; overflow: hidden; font-family: 'Inter', sans-serif; }
        #root { width: 100vw; height: 100vh; position: relative; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Imports -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "three": "https://esm.sh/three@0.160.0",
            "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.14?external=react,react-dom,three"
        }
    }
    </script>

    <script>
        // Suppress warnings for clean devtools
        const origWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && (args[0].includes('in-browser Babel transformer') || args[0].includes('cdn.tailwindcss.com should not be used in production'))) return;
            origWarn.apply(console, args);
        };
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-type="module">
        import React, { useRef, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import * as THREE from 'three';
        import { Canvas, useFrame, useThree } from '@react-three/fiber';

        const NUM = 5000; // Flawless 60fps on integrated graphics with InstancedMesh

        // --- 4 Absolute Full-Screen Background Phases ---
        // All arrays center directly around [0,0,0] where the camera rests, wrapping the viewport completely.

        // 1. The Void (Random full-screen universe)
        const getVoidTargets = () => {
            const pos = new Float32Array(NUM * 3);
            const col = new Float32Array(NUM * 3);
            for(let i=0; i<NUM; i++) {
                // Fills a massive 160x160x160 cubic volume centered on the camera
                pos[i*3] = (Math.random() - 0.5) * 160; 
                pos[i*3+1] = (Math.random() - 0.5) * 160; 
                pos[i*3+2] = (Math.random() - 0.5) * 160; 
                // Color: Subtly glowing dark cyans/blues
                col[i*3] = 0.1; col[i*3+1] = 0.5 + Math.random()*0.5; col[i*3+2] = 0.8 + Math.random()*0.2;
            }
            return { pos, col };
        };

        // 2. The Lattice (Infinite 3D Cyber-Grid)
        const getLatticeTargets = () => {
            const pos = new Float32Array(NUM * 3);
            const col = new Float32Array(NUM * 3);
            const side = Math.ceil(Math.cbrt(NUM)); // ~18
            const spacing = 10;
            for(let i=0; i<NUM; i++) {
                const x = (i % side) - side/2;
                const y = (Math.floor(i / side) % side) - side/2;
                const z = (Math.floor(i / (side * side))) - side/2;
                
                pos[i*3] = x * spacing + (Math.random()-0.5);
                pos[i*3+1] = y * spacing + (Math.random()-0.5);
                pos[i*3+2] = z * spacing + (Math.random()-0.5);
                // Color: Synthwave fuchsia/purples
                col[i*3] = 0.8 + Math.random()*0.2; col[i*3+1] = 0.1 + Math.random()*0.2; col[i*3+2] = 0.6 + Math.random()*0.4;
            }
            return { pos, col };
        };

        // 3. The Digital Ocean (Infinite ceiling and floor waves)
        const getOceanTargets = () => {
            const pos = new Float32Array(NUM * 3);
            const col = new Float32Array(NUM * 3);
            const side = Math.ceil(Math.sqrt(NUM)); // ~71
            const spacing = 4;
            for(let i=0; i<NUM; i++) {
                const x = (i % side) - side/2;
                const z = Math.floor(i / side) - side/2;
                
                pos[i*3] = x * spacing;
                // Double plane mapping: push half the nodes up 25 units, half down 25 units
                pos[i*3+1] = (i % 2 === 0) ? 25 : -25;
                pos[i*3+2] = z * spacing;

                // Color: Emerald greens and digital golds
                col[i*3] = 0.1; col[i*3+1] = 0.9 + Math.random()*0.1; col[i*3+2] = 0.4 + Math.random()*0.3;
            }
            return { pos, col };
        };

        // 4. Warp Hyperspace (Massive enveloping tube pushing stars past the camera)
        const getTunnelTargets = () => {
            const pos = new Float32Array(NUM * 3);
            const col = new Float32Array(NUM * 3);
            for(let i=0; i<NUM; i++) {
                const angle = Math.random() * Math.PI * 2;
                // Leave a huge 15-unit radius hole in the center for the camera to fly through
                const radius = 15 + Math.random() * 20; 
                // Stretch the tunnel 300 units deep
                const depth = (Math.random() - 0.5) * 300; 

                pos[i*3] = Math.cos(angle) * radius;
                pos[i*3+1] = Math.sin(angle) * radius;
                pos[i*3+2] = depth;

                // Color: Hyper-speed deep reds and oranges
                col[i*3] = 0.9 + Math.random()*0.1; col[i*3+1] = 0.4 + Math.random()*0.2; col[i*3+2] = 0.1;
            }
            return { pos, col };
        };

        const AmbientBackground = () => {
            const meshRef = useRef();
            const groupRef = useRef();

            // Setup buffers safely outside of the render loop
            const { buffers, shapes } = useMemo(() => {
                const shapes = [getVoidTargets(), getLatticeTargets(), getOceanTargets(), getTunnelTargets()];
                
                // Active buffers that get rendered identically to the GPU
                const currentPos = new Float32Array(shapes[0].pos);
                const currentCol = new Float32Array(shapes[0].col);

                return { buffers: { currentPos, currentCol }, shapes };
            }, []);

            const dummy = useMemo(() => new THREE.Object3D(), []);

            useFrame((state, delta) => {
                const time = state.clock.elapsedTime;
                
                // 1. Math State Machine: Switches massive environments every 6 seconds
                const phaseTime = 6;
                const activePhase = Math.floor(time / phaseTime) % 4;
                const targetPos = shapes[activePhase].pos;
                const targetCol = shapes[activePhase].col;

                const { currentPos, currentCol } = buffers;

                // 2. Ultra-Performant Lerp Physics
                const LERP_SPEED = Math.min(0.04, delta * 4); // Smooth transition speed

                for(let i=0; i<NUM; i++) {
                    const i3 = i * 3;
                    
                    // Natively migrate matrices between shapes
                    currentPos[i3] += (targetPos[i3] - currentPos[i3]) * LERP_SPEED;
                    currentPos[i3+1] += (targetPos[i3+1] - currentPos[i3+1]) * LERP_SPEED;
                    currentPos[i3+2] += (targetPos[i3+2] - currentPos[i3+2]) * LERP_SPEED;

                    currentCol[i3] += (targetCol[i3] - currentCol[i3]) * LERP_SPEED;
                    currentCol[i3+1] += (targetCol[i3+1] - currentCol[i3+1]) * LERP_SPEED;
                    currentCol[i3+2] += (targetCol[i3+2] - currentCol[i3+2]) * LERP_SPEED;

                    // Organic, phase-specific native offsets (breathing, waving, flying)
                    let ox = 0, oy = 0, oz = 0;

                    if (activePhase === 0) { // Void Drift
                        ox = Math.sin(time + i) * 2;
                        oy = Math.cos(time + i) * 2;
                    } else if (activePhase === 1) { // Lattice Breathing
                        oy = Math.sin(time * 2 + currentPos[i3] * 0.1) * 2;
                    } else if (activePhase === 2) { // Double Ocean Wave
                        oy = Math.sin(time * 3 + currentPos[i3] * 0.1 + currentPos[i3+2] * 0.1) * 6;
                        if(currentPos[i3+1] > 0) oy = -oy; // Ceiling waves opposite to floor
                    } else if (activePhase === 3) { // Hyper Tunnel Stretch
                        // Add extreme velocity feeling by animating Z axis rapidly
                        oz = (time * 50 + currentPos[i3+2]) % 300 - 150; 
                    }

                    // Apply to dummy object
                    // In phase 3, we force wrap Z because of the direct mod calculation above
                    const finalZ = activePhase === 3 ? oz : currentPos[i3+2];
                    dummy.position.set(currentPos[i3] + ox, currentPos[i3+1] + oy, finalZ);
                    
                    // Shape morphing: Turn spheres into massive streaks during Hyperspace
                    if (activePhase === 3) {
                        dummy.scale.set(0.1, 0.1, 6.0); // Extreme Z-streak
                    } else {
                        // Gentle pulsing
                        dummy.scale.setScalar(1 + Math.sin(time * 3 + i) * 0.4);
                    }

                    dummy.updateMatrix();
                    meshRef.current.setMatrixAt(i, dummy.matrix);
                }

                // Push all 15,000 float vertices immediately to the GPU in a single call
                meshRef.current.instanceMatrix.needsUpdate = true;
                meshRef.current.geometry.attributes.color.needsUpdate = true;

                // Slowly spin the camera's wrapper to make the environments feel alive and unending
                if (groupRef.current) {
                    groupRef.current.rotation.z = time * 0.05;
                    groupRef.current.rotation.y = time * 0.05;
                    groupRef.current.position.z = Math.sin(time * 0.2) * 5;
                }
            });

            return (
                <group ref={groupRef}>
                    {/* Instancing bypasses React node limitations entirely */}
                    <instancedMesh ref={meshRef} args={[null, null, NUM]}>
                        <sphereGeometry args={[0.08, 8, 8]}>
                            <instancedBufferAttribute attach="attributes-color" args={[buffers.currentCol, 3]} />
                        </sphereGeometry>
                        <meshBasicMaterial 
                            vertexColors 
                            toneMapped={false} 
                            blending={THREE.AdditiveBlending} 
                            depthWrite={false} 
                            transparent 
                            opacity={0.85} 
                        />
                    </instancedMesh>
                </group>
            );
        };

        const Scene = () => {
            const { camera, pointer } = useThree();

            // Parallax camera tied softly to mouse movement to let user look around the environments
            useFrame(() => {
                camera.position.x += (pointer.x * 5 - camera.position.x) * 0.05;
                camera.position.y += (pointer.y * 5 - camera.position.y) * 0.05;
                camera.lookAt(0, 0, 0);
            });

            return <AmbientBackground />;
        };

        const App = () => {
            return (
                <div className="w-full h-screen bg-slate-950 flex flex-col items-center justify-center relative touch-none">
                    <div className="w-full h-full cursor-crosshair">
                        {/* 
                          Important Performance Setup: 
                          - camera=[0,0,0] sits INSIDE the environments. 
                          - dpr capped to 1.5 prevents integrated GPUs from choking on high-res Macbook/Windows screens.
                          - alpha=false prevents expensive frame-clears.
                        */}
                        <Canvas dpr={Math.min(window.devicePixelRatio, 1.5)} camera={{ position: [0, 0, 0], fov: 60, near: 0.1, far: 500 }} gl={{ antialias: true, alpha: false }}>
                            <color attach="background" args={['#020617']} />
                            <Scene />
                        </Canvas>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
