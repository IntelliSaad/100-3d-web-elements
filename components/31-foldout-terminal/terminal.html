<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Fold-Out Terminal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neutral: {
                            950: '#0a0a0a',
                            900: '#171717',
                            800: '#262626'
                        }
                    },
                    fontFamily: {
                        mono: ['"Fira Code"', '"JetBrains Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; background-color: #0a0a0a; color: white; /* Let page scroll */ overflow-x: hidden; }
        
        /* Glassmorphism terminal header */
        .terminal-header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Syntax highlighting colors */
        .syntax-keyword { color: #ff7b72; }
        .syntax-function { color: #d2a8ff; }
        .syntax-string { color: #a5d6ff; }
        .syntax-comment { color: #8b949e; }
        .syntax-variable { color: #c9d1d9; }
        .syntax-operator { color: #79c0ff; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React, ReactDOM, and Framer Motion via ESM -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@11.0.8?external=react,react-dom",
            "three": "https://esm.sh/three@0.160.0",
            "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.14?external=react,react-dom,three",
            "@react-three/drei": "https://esm.sh/@react-three/drei@9.96.1?external=react,react-dom,three,@react-three/fiber"
        }
    }
    </script>

    <!-- Babel for JSX -->
    <script>
        // Suppress Babel warning
        const origWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && args[0].includes('in-browser Babel transformer')) return;
            origWarn.apply(console, args);
        };
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion } from 'framer-motion';
        import * as THREE from 'three';
        import { Canvas, useFrame } from '@react-three/fiber';

        const SyntaxTree = ({ isHovered }) => {
            const groupRef = useRef();
            const pointsRef = useRef();
            const linesRef = useRef();

            // Create a deterministic random tree geometry once
            const [pointsGeo, linesGeo] = useMemo(() => {
                const p = [];
                const l = [];
                const nodeCount = 50;
                
                // Generate random nodes in a structured shape
                for (let i=0; i < nodeCount; i++) {
                    p.push(
                        (Math.random() - 0.5) * 8, 
                        (Math.random() - 0.5) * 6, 
                        (Math.random() - 0.5) * 4
                    );
                }
                
                // Connect nearby nodes
                for (let i=0; i < nodeCount; i++) {
                    for (let j=i+1; j < nodeCount; j++) {
                        const dx = p[i*3] - p[j*3];
                        const dy = p[i*3+1] - p[j*3+1];
                        const dz = p[i*3+2] - p[j*3+2];
                        const distSq = dx*dx + dy*dy + dz*dz;
                        if (distSq < 4) { // Threshold for connection
                            l.push(p[i*3], p[i*3+1], p[i*3+2]);
                            l.push(p[j*3], p[j*3+1], p[j*3+2]);
                        }
                    }
                }
                
                const geoPoints = new THREE.BufferGeometry();
                geoPoints.setAttribute('position', new THREE.Float32BufferAttribute(p, 3));
                
                const geoLines = new THREE.BufferGeometry();
                geoLines.setAttribute('position', new THREE.Float32BufferAttribute(l, 3));
                
                return [geoPoints, geoLines];
            }, []);

            const currentSpeed = useRef(0.002);

            useFrame((state, delta) => {
                const targetSpeed = isHovered ? 0.02 : 0.002;
                if (groupRef.current) {
                    // Smoothly interpolate rotation speed
                    currentSpeed.current += (targetSpeed - currentSpeed.current) * delta * 5;
                    groupRef.current.rotation.y += currentSpeed.current;
                    groupRef.current.rotation.x += currentSpeed.current * 0.5;

                    // Pulse brightness
                    const pulse = isHovered ? Math.sin(state.clock.elapsedTime * 6) * 0.5 + 0.5 : 0;
                    if (pointsRef.current) {
                        pointsRef.current.material.size = isHovered ? 0.15 + pulse * 0.15 : 0.08;
                        pointsRef.current.material.opacity = isHovered ? 0.9 : 0.4;
                    }
                    if (linesRef.current) {
                        linesRef.current.material.opacity = isHovered ? 0.5 : 0.15;
                    }
                }
            });

            return (
                <group ref={groupRef}>
                    <points ref={pointsRef} geometry={pointsGeo}>
                        <pointsMaterial color="#00ffcc" size={0.08} sizeAttenuation={true} transparent opacity={0.4} blending={THREE.AdditiveBlending} depthWrite={false} />
                    </points>
                    <lineSegments ref={linesRef} geometry={linesGeo}>
                        <lineBasicMaterial color="#00ffcc" transparent opacity={0.15} blending={THREE.AdditiveBlending} depthWrite={false} />
                    </lineSegments>
                </group>
            );
        };

        const FoldOutTerminal = () => {
            const [isInView, setIsInView] = useState(false);
            const [isHovered, setIsHovered] = useState(false);

            return (
                <div style={{ perspective: '1200px' }} className="w-full max-w-4xl mx-auto py-24 px-4 flex justify-center">
                    <motion.div
                        // Framer Motion physics for the fold-out effect
                        initial={{ rotateX: 90, opacity: 0, y: 50, scale: 0.9 }}
                        whileInView={{ rotateX: 0, opacity: 1, y: 0, scale: 1 }}
                        viewport={{ once: false, amount: 0.4 }} // Trigger when 40% visible
                        onViewportEnter={() => setIsInView(true)}
                        onViewportLeave={() => setIsInView(false)}
                        onMouseEnter={() => setIsHovered(true)}
                        onMouseLeave={() => setIsHovered(false)}
                        transition={{ 
                            type: "spring", 
                            stiffness: 100, 
                            damping: 20,
                            mass: 0.8
                        }}
                        style={{ 
                            transformOrigin: "bottom center", // Fold open from the bottom hinge like a laptop
                            transformStyle: 'preserve-3d'
                        }}
                        className="w-full h-[500px] bg-neutral-900 rounded-xl overflow-hidden shadow-2xl border border-white/10 flex flex-col relative"
                    >
                        {/* Fake 3D thickness side-panels using pseudo-elements would go here if needed, but CSS drop-shadow handles most of the physical feel */}

                        {/* macOS Standard Window Header */}
                        <div className="h-12 w-full terminal-header flex items-center px-4 relative shrink-0">
                            {/* Traffic Lights */}
                            <div className="flex gap-2">
                                <div className="w-3 h-3 rounded-full bg-[#ff5f56] border border-[#ff5f56]/20"></div>
                                <div className="w-3 h-3 rounded-full bg-[#ffbd2e] border border-[#ffbd2e]/20"></div>
                                <div className="w-3 h-3 rounded-full bg-[#27c93f] border border-[#27c93f]/20"></div>
                            </div>
                            
                            {/* Window Title */}
                            <div className="absolute left-1/2 -translate-x-1/2 flex items-center gap-2 text-neutral-400 text-sm font-medium">
                                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 12h14M12 5l7 7-7 7" />
                                </svg>
                                zsh - deployment
                            </div>
                        </div>

                        {/* Terminal Body */}
                        <div className="flex-1 bg-black/50 relative overflow-hidden">
                            {/* Very faint background grid for developer aesthetic */}
                            <div className="absolute inset-0 z-0 opacity-10" style={{ backgroundImage: 'linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px)', backgroundSize: '20px 20px' }}></div>
                            
                            <div className="absolute inset-0 z-10 w-full h-full cursor-crosshair">
                                {/* Only mount the canvas when terminal unfolds to save GPU overhead entirely */}
                                {isInView && (
                                    <Canvas camera={{ position: [0, 0, 8], fov: 45 }}>
                                        <SyntaxTree isHovered={isHovered} />
                                    </Canvas>
                                )}
                            </div>
                        </div>
                    </motion.div>
                </div>
            );
        };

        const App = () => {
            return (
                <div className="w-full flex justify-center items-center min-h-[1000px] bg-neutral-950 flex-col">
                    <div className="h-[20vh] w-full flex items-center justify-center text-neutral-600 font-mono text-sm tracking-widest uppercase">
                        Scroll Down to Trigger 3D Fold
                    </div>
                    
                    <FoldOutTerminal />
                    
                    <div className="h-[20vh] w-full"></div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
