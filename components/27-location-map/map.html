<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3D Location Terrain Map</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    
    body {
      background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
      width:100%; height:100vh; overflow:hidden;
      font-family:'Inter', sans-serif;
      display:flex;
    }

    #canvas-container {
      flex: 1;
      position:relative;
    }

    canvas { display:block; outline:none; cursor:grab; }
    canvas:active { cursor:grabbing; }

    /* Left Panel Contact UI */
    .contact-panel {
      width: 420px;
      background: #0f172a;
      border-right: 1px solid rgba(255,255,255,0.05);
      padding: 50px 40px;
      display: flex; flex-direction: column;
      z-index: 10;
      color: #f8fafc;
    }

    .eyebrow { font-weight:700; font-size:12px; letter-spacing:3px; color:#38bdf8; text-transform:uppercase; margin-bottom:12px; }
    h1 { font-size:36px; font-weight:700; margin-bottom:16px; letter-spacing:-1px; }
    p { color:#94a3b8; line-height:1.6; font-size:15px; margin-bottom:40px; }

    .input-grp { margin-bottom: 20px; }
    label { display:block; font-size:13px; font-weight:600; color:#cbd5e1; margin-bottom:8px; }
    input, textarea {
      width: 100%; padding:14px; border-radius:8px;
      background: #1e293b; border: 1px solid #334155;
      color: #fff; font-family:'Inter', sans-serif;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: #38bdf8; outline:none; }
    textarea { height: 100px; resize:none; }

    .submit-btn {
      width:100%; padding:16px; border-radius:8px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      color:#fff; border:none;
      font-size:16px; font-weight:600; cursor:pointer;
      transition:opacity 0.2s;
      margin-top: 10px;
    }
    .submit-btn:hover { opacity:0.9; }

    .location-info {
      margin-top: auto;
      padding-top: 30px; border-top: 1px solid rgba(255,255,255,0.1);
      display: flex; gap: 15px; align-items:flex-start;
    }
    .pin-icon { font-size:24px; color:#38bdf8; }
    .loc-text { font-size:14px; color:#cbd5e1; line-height:1.5; }
    .loc-text strong { color:#fff; display:block; margin-bottom:4px; }

    .hint {
      position:absolute; bottom:20px; right:20px;
      font-size:11px; color:rgba(255,255,255,0.3); letter-spacing:2px; text-transform:uppercase;
      pointer-events:none;
    }

    @media (max-width: 850px) {
      body { flex-direction:column-reverse; }
      #canvas-container { height: 40vh; flex:none; }
      .contact-panel { width:100%; height:60vh; padding:30px 20px; overflow-y:auto; }
    }
  </style>
</head>
<body>

<div class="contact-panel">
  <div>
    <div class="eyebrow">Get In Touch</div>
    <h1>Global HQ</h1>
    <p>Visit our cutting-edge innovation lab or drop us a message below.</p>
  </div>

  <form onsubmit="event.preventDefault()">
    <div class="input-grp">
      <label>Name</label>
      <input type="text" placeholder="John Doe">
    </div>
    <div class="input-grp">
      <label>Message</label>
      <textarea placeholder="How can we help you?"></textarea>
    </div>
    <button class="submit-btn" type="button">Send Transmission</button>
  </form>

  <div class="location-info">
    <div class="pin-icon">📍</div>
    <div class="loc-text">
      <strong>Sector 7G, Cyber District</strong>
      1001 Matrix Blvd, Neo-City<br/>
      CA 94105, Earth
    </div>
  </div>
</div>

<div id="canvas-container">
  <div class="hint">drag to rotate map</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const container = document.getElementById('canvas-container');
let W = container.clientWidth;
let H = container.clientHeight;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(W, H);
// Enable shadows for realism
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
// Isometric perspective
const camera = new THREE.OrthographicCamera(-5, 5, 5, -5, 0.1, 100);
camera.position.set(10, 10, 10);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.enableZoom = false; // keep framing fixed
controls.enablePan = false;
controls.maxPolarAngle = Math.PI/2 - 0.1; // Don't allow going under the map

// ── CUSTOM LIGHTING FOR STYLIZED CITY ─────────────────
const ambient = new THREE.AmbientLight(0x1a2e4c, 1.2); // Cool night ambient
scene.add(ambient);

const keyLight = new THREE.DirectionalLight(0xfff5e6, 2.5); // Warm sun/streetlamp
keyLight.position.set(5, 8, -5);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 1024;
keyLight.shadow.mapSize.height = 1024;
keyLight.shadow.bias = -0.001;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x38bdf8, 1.0); // Cyan rim light
fillLight.position.set(-5, 3, 5);
scene.add(fillLight);


// ── MATERIALS ─────────────────────────────────────────
const matBase = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.9 });
const matBuilding = new THREE.MeshStandardMaterial({ color: 0x334155, roughness: 0.7, metalness: 0.2 });
const matHighlight = new THREE.MeshStandardMaterial({ color: 0x0f172a, roughness: 0.5, metalness: 0.4 });
const matPinTop = new THREE.MeshStandardMaterial({ color: 0x38bdf8, roughness: 0.1, metalness: 0.8 }); // Glossy Cyan
const matPinDot = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1 });

const mapGroup = new THREE.Group();
scene.add(mapGroup);

// ── TERRAIN BASE (Thick City Block) ──────────────────
const baseGeo = new THREE.BoxGeometry(6, 1, 6);
const base = new THREE.Mesh(baseGeo, matBase);
base.position.y = -0.5;
base.receiveShadow = true;
base.castShadow = true;
mapGroup.add(base);

// Road lines
const roadGeo = new THREE.PlaneGeometry(6, 0.6);
const matRoad = new THREE.MeshBasicMaterial({ color: 0x0f172a });
const road1 = new THREE.Mesh(roadGeo, matRoad);
road1.rotation.x = -Math.PI/2;
road1.position.y = 0.01;
road1.position.z = 1.0;
road1.receiveShadow = true;
mapGroup.add(road1);

const road2 = new THREE.Mesh(roadGeo, matRoad);
road2.rotation.x = -Math.PI/2;
road2.rotation.z = Math.PI/2;
road2.position.y = 0.01;
road2.position.x = -1.0;
road2.receiveShadow = true;
mapGroup.add(road2);


// ── PROCEDURAL BUILDINGS ─────────────────────────────
// Hardcode positions for a dense city block look without importing a model
const bData = [
  // x, z, w, h, d, type
  [2, -2, 1.2, 3.0, 1.2, matBuilding],
  [2.1, 0, 0.8, 1.2, 0.8, matBuilding],
  [2.0, 2.0, 1.5, 4.2, 1.5, matHighlight], // The main HQ wrapper 
  [0, -2, 0.8, 2.0, 0.8, matBuilding],
  [-2.2, -2.2, 1.0, 1.5, 1.0, matBuilding],
  [-2.0, 0.5, 0.9, 1.8, 0.9, matBuilding],
  [-0.2, 2.2, 0.7, 1.0, 0.7, matBuilding],
  [-2.2, 2.2, 1.2, 2.5, 1.2, matBuilding]
];

const bGeometries = [];
bData.forEach(d => {
  const geo = new THREE.BoxGeometry(d[2], d[3], d[4]);
  // shift origin to bottom
  geo.translate(0, d[3]/2, 0);
  const mesh = new THREE.Mesh(geo, d[5]);
  mesh.position.set(d[0], 0, d[1]);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mapGroup.add(mesh);
});

// ── GIANT LOCATION PIN ───────────────────────────────
const pinGroup = new THREE.Group();

// Pin cone/body
const pinGeo = new THREE.ConeGeometry(0.5, 1.5, 32);
pinGeo.translate(0, 0.75, 0); // Origin at tip
const pinMesh = new THREE.Mesh(pinGeo, matPinTop);
pinMesh.rotation.x = Math.PI; // point downwards
pinMesh.position.y = 2.0; 
pinMesh.castShadow = true;
pinGroup.add(pinMesh);

// Pin head sphere
const headGeo = new THREE.SphereGeometry(0.5, 32, 32);
const headMesh = new THREE.Mesh(headGeo, matPinTop);
headMesh.position.y = 2.0;
headMesh.castShadow = true;
pinGroup.add(headMesh);

// Inner white dot
const dotGeo = new THREE.SphereGeometry(0.25, 16, 16);
const dotMesh = new THREE.Mesh(dotGeo, matPinDot);
dotMesh.position.y = 2.0;
dotMesh.position.z = 0.4; // Slightly offset to stick out
pinGroup.add(dotMesh);

// Place pin above the HQ building [2, 2]
pinGroup.position.set(2.0, 4.3, 2.0);
scene.add(pinGroup);


// ── ANIMATION LOOP ──────────────────────────────────
const clock = new THREE.Clock();
let isIdle = true;
let idleTimer = null;

controls.addEventListener('start', () => { 
  isIdle = false; 
  clearTimeout(idleTimer);
});
controls.addEventListener('end', () => {
  idleTimer = setTimeout(() => { isIdle = true; }, 3000);
});

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Gentle floating animation for the map block when idle
  if (isIdle) {
    mapGroup.position.y = Math.sin(t * 1.5) * 0.1;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;
  } else {
    controls.autoRotate = false;
  }

  // Pin bobs independently 
  pinGroup.position.y = 4.3 + Math.sin(t * 4) * 0.15;

  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  W = container.clientWidth;
  H = container.clientHeight;
  
  // Update Orthographic Camera
  const aspect = W / H;
  const viewSize = 7.5; // Zoom level
  camera.left = -aspect * viewSize;
  camera.right = aspect * viewSize;
  camera.top = viewSize;
  camera.bottom = -viewSize;
  
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
});

// Trigger initial resize to setup ortho framing correctly
window.dispatchEvent(new Event('resize'));

</script>
</body>
</html>
