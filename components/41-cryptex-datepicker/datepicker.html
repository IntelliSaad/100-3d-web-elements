<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural 3D Cryptex Date Picker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: linear-gradient(160deg, #0a0a1a 0%, #0f172a 40%, #1a1040 100%); min-height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; color: white; }
        #root { width: 100%; height: 100vh; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="root"></div>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "three": "https://esm.sh/three@0.160.0",
            "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.14?external=react,react-dom,three",
            "@react-three/drei": "https://esm.sh/@react-three/drei@9.92.7?external=react,react-dom,three,@react-three/fiber"
        }
    }
    </script>

    <script>
        const origWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && (args[0].includes('in-browser Babel transformer') || args[0].includes('cdn.tailwindcss.com should not be used in production'))) return;
            origWarn.apply(console, args);
        };
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-type="module">
        import React, { useRef, useState, useMemo, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import * as THREE from 'three';
        import { Canvas, useFrame, useThree } from '@react-three/fiber';
        import { Text } from '@react-three/drei';

        const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

        // Draggable spinning ring with magnetic snap
        const CryptexRing = ({ position, items, color, activeIndex, onIndexChange, label }) => {
            const groupRef = useRef();
            const isDragging = useRef(false);
            const lastY = useRef(0);
            const currentRotation = useRef(0);
            const targetRotation = useRef(0);
            const velocity = useRef(0);
            const { invalidate } = useThree();

            const anglePerItem = (Math.PI * 2) / items.length;
            const ringRadius = 1.2;

            // Snap the rotation to the nearest valid item
            const snapToNearest = useCallback(() => {
                const anglePerItem = (Math.PI * 2) / items.length;
                const nearest = Math.round(currentRotation.current / anglePerItem);
                targetRotation.current = nearest * anglePerItem;

                // Calculate the new index
                const idx = ((-nearest % items.length) + items.length) % items.length;
                onIndexChange(idx);
            }, [items.length, onIndexChange]);

            useFrame(() => {
                if (isDragging.current) {
                    currentRotation.current += velocity.current;
                    velocity.current *= 0.92; // Friction
                } else {
                    // Spring toward target (magnetic snap)
                    const diff = targetRotation.current - currentRotation.current;
                    currentRotation.current += diff * 0.12;
                }
                
                if (groupRef.current) {
                    groupRef.current.rotation.x = currentRotation.current;
                }
                invalidate();
            });

            const handlePointerDown = (e) => {
                e.stopPropagation();
                isDragging.current = true;
                lastY.current = e.clientY || e.touches?.[0]?.clientY || 0;
                e.target.setPointerCapture?.(e.pointerId);
            };

            const handlePointerMove = (e) => {
                if (!isDragging.current) return;
                const clientY = e.clientY || e.touches?.[0]?.clientY || 0;
                const delta = (clientY - lastY.current) * 0.01;
                velocity.current = delta;
                lastY.current = clientY;
            };

            const handlePointerUp = () => {
                isDragging.current = false;
                snapToNearest();
            };

            return (
                <group position={position}>
                    {/* Label above the ring */}
                    <Text
                        position={[0, 2.2, 0]}
                        fontSize={0.22}
                        color="#64748b"
                        anchorX="center"
                        letterSpacing={0.15}
                        font="https://fonts.gstatic.com/s/inter/v12/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuLyfMZg.woff"
                    >
                        {label}
                    </Text>

                    {/* Invisible drag surface */}
                    <mesh
                        position={[0, 0, 0]}
                        onPointerDown={handlePointerDown}
                        onPointerMove={handlePointerMove}
                        onPointerUp={handlePointerUp}
                        onPointerLeave={handlePointerUp}
                    >
                        <cylinderGeometry args={[ringRadius + 0.3, ringRadius + 0.3, 1.5, 16]} />
                        <meshBasicMaterial transparent opacity={0} />
                    </mesh>

                    {/* The physical ring body */}
                    <mesh>
                        <cylinderGeometry args={[ringRadius + 0.1, ringRadius + 0.1, 1.2, 32, 1, true]} />
                        <meshStandardMaterial 
                            color={color}
                            metalness={0.6} 
                            roughness={0.3}
                            side={THREE.DoubleSide}
                            transparent
                            opacity={0.25}
                        />
                    </mesh>

                    {/* Rotating text ring */}
                    <group ref={groupRef}>
                        {items.map((item, i) => {
                            const angle = i * anglePerItem;
                            const y = Math.cos(angle) * ringRadius;
                            const z = Math.sin(angle) * ringRadius;

                            return (
                                <group key={i} position={[0, y, z]} rotation={[angle, 0, 0]}>
                                    <Text
                                        fontSize={0.4}
                                        color={i === activeIndex ? '#ffffff' : '#64748b'}
                                        anchorX="center"
                                        anchorY="middle"
                                        font="https://fonts.gstatic.com/s/inter/v12/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuLyfMZg.woff"
                                        fontWeight={i === activeIndex ? 800 : 500}
                                    >
                                        {String(item)}
                                    </Text>
                                </group>
                            );
                        })}
                    </group>

                    {/* Selection indicator - glowing line */}
                    <mesh position={[0, ringRadius + 0.05, 0.3]}>
                        <boxGeometry args={[1.0, 0.03, 0.01]} />
                        <meshBasicMaterial color={color} transparent opacity={0.8} />
                    </mesh>
                </group>
            );
        };

        const App = () => {
            const [day, setDay] = useState(15);
            const [month, setMonth] = useState(2);
            const [year, setYear] = useState(5);

            const days = useMemo(() => Array.from({length: 31}, (_, i) => String(i + 1).padStart(2, '0')), []);
            const years = useMemo(() => Array.from({length: 12}, (_, i) => String(2020 + i)), []);

            return (
                <div className="w-full h-full flex flex-col items-center justify-center" style={{ background: 'linear-gradient(160deg, #0a0a1a 0%, #0f172a 40%, #1a1040 100%)' }}>
                    {/* Title */}
                    <div className="text-center mb-2 z-10">
                        <p className="text-xs uppercase tracking-[0.3em] text-slate-500 mb-1">Drag to Rotate</p>
                        <h2 className="text-xl font-bold text-white">Procedural Cryptex</h2>
                    </div>

                    {/* 3D Canvas */}
                    <div className="w-full max-w-2xl" style={{ height: '280px' }}>
                        <Canvas
                            frameloop="demand"
                            dpr={Math.min(window.devicePixelRatio, 1.5)}
                            camera={{ position: [0, 1, 6], fov: 40 }}
                            gl={{ antialias: true, alpha: false }}
                        >
                            <color attach="background" args={['#0a0a1a']} />
                            <ambientLight intensity={0.5} />
                            <pointLight position={[5, 5, 5]} intensity={1} color="#8b5cf6" />
                            <pointLight position={[-5, 2, 3]} intensity={0.4} color="#06b6d4" />

                            <CryptexRing 
                                position={[-2.5, 0, 0]} 
                                items={days} 
                                color="#8b5cf6"
                                activeIndex={day}
                                onIndexChange={setDay}
                                label="DAY"
                            />
                            <CryptexRing 
                                position={[0, 0, 0]} 
                                items={MONTHS} 
                                color="#06b6d4"
                                activeIndex={month}
                                onIndexChange={setMonth}
                                label="MONTH"
                            />
                            <CryptexRing 
                                position={[2.5, 0, 0]} 
                                items={years}
                                color="#f59e0b"
                                activeIndex={year}
                                onIndexChange={setYear}
                                label="YEAR"
                            />
                        </Canvas>
                    </div>

                    {/* Selected Date Display */}
                    <div className="text-center mt-2 z-10">
                        <div 
                            className="inline-flex items-center gap-3 px-6 py-3 rounded-2xl"
                            style={{
                                background: 'rgba(255,255,255,0.04)',
                                border: '1px solid rgba(255,255,255,0.08)',
                                boxShadow: '0 8px 32px rgba(0,0,0,0.2)',
                            }}
                        >
                            <span className="text-violet-400 font-bold text-lg font-mono">{days[day]}</span>
                            <span className="text-slate-600">/</span>
                            <span className="text-cyan-400 font-bold text-lg font-mono">{MONTHS[month]}</span>
                            <span className="text-slate-600">/</span>
                            <span className="text-amber-400 font-bold text-lg font-mono">{years[year]}</span>
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
